<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcha2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --indigo: #6366F1;
            --violet: #8B5CF6;
            --violet-light: #A78BFA;
            --soft-bg: #FAFAFA;
            --card-bg: #ffffff;
            --text-dark: #111827;
            --text-mid: #4B5563;
            --text-light: #9CA3AF;
            --border: #E5E7EB;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--soft-bg);
            min-height: 100vh;
            display: flex;
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(145deg, #4f46e5 0%, #7c3aed 50%, #6d28d9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 50px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 350px; height: 350px;
            background: rgba(255,255,255,0.07);
            border-radius: 50%;
            top: -80px; left: -80px;
        }
        .left-panel::after {
            content: '';
            position: absolute;
            width: 250px; height: 250px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            bottom: -60px; right: -60px;
        }

        .brand {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
        }

        .brand-logo img {
            border-radius: 17%;
        }

        .brand h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3.2rem;
        }

        .right-panel {
            width: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 50px;
            background: var(--card-bg);
        }

        .right-inner {
            width: 100%;
            max-width: 360px;
        }

        .tab-nav {
            display: flex;
            background: #F3F4F6;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 36px;
        }

        .tab-nav button {
            flex: 1;
            padding: 9px 0;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .tab-nav button.active {
            background: white;
            color: var(--indigo);
        }

        .form-title {
            font-size: 1.6rem;
            margin-bottom: 6px;
        }

        .form-subtitle {
            margin-bottom: 32px;
            color: var(--text-light);
        }

        .field {
            margin-bottom: 20px;
        }

        .field input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--indigo), var(--violet));
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .forgot {
            display: block;
            text-align: right;
            margin-bottom: 20px;
            font-size: small;
        }

        @media (max-width: 800px) {
            body { flex-direction: column; }
            .right-panel { width: 100%; }
        }
    </style>
</head>

<body>

<div class="left-panel">
    <div class="brand">
        <div class="brand-logo">
            <img src="/imagenes/logo Parcaha2.png" width="120">
        </div>
        <h1>Parcha2</h1>
        <p>Conecta, crea y comparte experiencias increíbles</p>
    </div>
</div>

<div class="right-panel">
<div class="right-inner">

<nav class="tab-nav">
    <button class="active" id="btn-login">Iniciar sesión</button>
    <button id="btn-register">Registrarse</button>
</nav>

<h2 class="form-title">Bienvenido de vuelta</h2>
<p class="form-subtitle">Accede a tu cuenta para continuar</p>

<!-- LOGIN -->
<form id="login-form">
    <div class="field">
        <input type="email" id="email" placeholder="Correo electrónico">
    </div>

    <div class="field">
        <input type="password" id="password" placeholder="Contraseña">
    </div>

    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

    <button type="submit" class="btn-primary">Iniciar sesión</button>
</form>

<!-- REGISTER -->
<form id="register-form" style="display:none;">
    <div class="field">
        <input type="text" id="name" placeholder="Nombre">
    </div>

    <div class="field">
        <input type="email" id="email-register" placeholder="Correo electrónico">
    </div>

    <div class="field">
        <input type="password" id="password-register" placeholder="Contraseña">
    </div>

    <div class="field">
        <input type="password" id="confirm-password" placeholder="Repetir contraseña">
    </div>

    <button type="submit" class="btn-primary">Crear cuenta</button>
</form>

</div>
</div>

<script>
const btnLogin = document.getElementById('btn-login');
const btnRegister = document.getElementById('btn-register');

const loginForm = document.getElementById('login-form');
const registerForm = document.getElementById('register-form');

const title = document.querySelector('.form-title');
const subtitle = document.querySelector('.form-subtitle');

btnLogin.addEventListener('click', () => {
    btnLogin.classList.add('active');
    btnRegister.classList.remove('active');

    loginForm.style.display = 'block';
    registerForm.style.display = 'none';

    title.textContent = 'Bienvenido de vuelta';
    subtitle.textContent = 'Accede a tu cuenta para continuar';
});

btnRegister.addEventListener('click', () => {
    btnRegister.classList.add('active');
    btnLogin.classList.remove('active');

    loginForm.style.display = 'none';
    registerForm.style.display = 'block';

    title.textContent = 'Crear cuenta';
    subtitle.textContent = 'Únete a parcha2 hoy mismo';
});

// LOGIN
loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
        alert('Completa todos los campos');
        return;
    }

    window.location.href = './Pagina mis Parches/MisParches.html';
});

// REGISTER
registerForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email-register').value.trim();
    const password = document.getElementById('password-register').value.trim();
    const confirmPassword = document.getElementById('confirm-password').value.trim();

    if (!name || !email || !password || !confirmPassword) {
        alert('Completa todos los campos');
        return;
    }

    if (password !== confirmPassword) {
        alert('Las contraseñas no coinciden');
        return;
    }

    alert('Cuenta creada correctamente (simulado)');
});
</script>

</body>
</html>
